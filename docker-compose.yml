services:
  postgres:
    image: postgres:17-alpine
    container_name: brewflow-postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brewflow_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d brewflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
